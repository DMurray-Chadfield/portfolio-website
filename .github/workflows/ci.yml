name: Build & Push Docker Image

on:
  workflow_run:
    workflows: ["Release On Merge"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout workflow run commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout manual dispatch ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Lowercase repository owner
        id: owner
        run: echo "repo_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          git fetch --tags --force
          version_tag=$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | head -n 1)
          release_version="${version_tag#v}"

          if [ -z "$version_tag" ]; then
            echo "release_version=" >> "$GITHUB_OUTPUT"
            cat <<EOF >> "$GITHUB_OUTPUT"
image_tags<<TAGS
ghcr.io/${{ steps.owner.outputs.repo_owner }}/portfolio-website:latest
TAGS
EOF
          else
            echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
            cat <<EOF >> "$GITHUB_OUTPUT"
image_tags<<TAGS
ghcr.io/${{ steps.owner.outputs.repo_owner }}/portfolio-website:latest
ghcr.io/${{ steps.owner.outputs.repo_owner }}/portfolio-website:${version_tag}
TAGS
EOF
          fi

      - name: Run checks
        shell: bash
        run: |
          if [ -n "${{ steps.tags.outputs.release_version }}" ]; then
            ./gradlew -PreleaseVersion="${{ steps.tags.outputs.release_version }}" check
          else
            ./gradlew check
          fi

      - name: Build Shadow JAR
        shell: bash
        run: |
          if [ -n "${{ steps.tags.outputs.release_version }}" ]; then
            ./gradlew -PreleaseVersion="${{ steps.tags.outputs.release_version }}" shadowJar
          else
            ./gradlew shadowJar
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm/v7
          push: true
          tags: ${{ steps.tags.outputs.image_tags }}
